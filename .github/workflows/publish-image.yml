name: Publish container image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Override tag (default: derived from package.json)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/geohazardwatch

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
          labels: |
            org.opencontainers.image.title=geohazardwatch
            org.opencontainers.image.description=Volcano and geology platform built on ngdpbase with the geohazardwatch addon
            org.opencontainers.image.vendor=jwilleke

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — start container
        run: |
          docker run -d --name ghw-smoke \
            -p 3000:3000 \
            -e HEADLESS_INSTALL=true \
            -e NODE_ENV=production \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Smoke test — wait for healthy
        run: |
          for i in $(seq 1 18); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' ghw-smoke 2>/dev/null || echo starting)
            echo "  attempt $i/18: $STATUS"
            if [ "$STATUS" = "healthy" ]; then exit 0; fi
            if [ "$STATUS" = "unhealthy" ]; then docker logs ghw-smoke; exit 1; fi
            sleep 5
          done
          echo "Timed out waiting for healthy"
          docker logs ghw-smoke
          exit 1

      - name: Smoke test — HTTP probe
        run: |
          BASE=http://localhost:3000
          code=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/")
          echo "GET / -> HTTP $code"
          case "$code" in
            2*|3*) ;;
            *) docker logs ghw-smoke; exit 1 ;;
          esac

      - name: Smoke test — dump logs on failure
        if: failure()
        run: docker logs ghw-smoke 2>&1 || true

      - name: Smoke test — cleanup
        if: always()
        run: docker rm -f ghw-smoke 2>/dev/null || true

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Image digest
        run: echo "Image digest ${{ steps.build.outputs.digest }}"
