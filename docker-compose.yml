# GeoHazardWatch — single-host Docker Compose
#
# Quick start:
#   docker compose up -d
#   open http://localhost:3000
#
# This is the easiest way to run your own GeoHazardWatch instance. The image
# is pulled from GHCR — no local build required. Page data, addon data,
# uploads, search index, logs, and sessions all live on the named volume
# `ghw-data` so they survive container restarts.
#
# For HTTPS, put a reverse proxy in front (Caddy, nginx, Cloudflare Tunnel)
# or pin to a specific image tag (image: ghcr.io/jwilleke/geohazardwatch:1.2.6)
# instead of latest.
#
# Customisation:
#   - HOST_PORT env var → change the host port (default 3000).
#   - To override defaults, drop an app-custom-config.json into the volume:
#     docker compose cp app-custom-config.json geohazardwatch:/app/data/config/
#     docker compose restart geohazardwatch
#   - See https://github.com/jwilleke/ngdpbase/blob/master/docs/admin/ for
#     the full configuration reference.

services:
  geohazardwatch:
    image: ghcr.io/jwilleke/geohazardwatch:latest
    container_name: geohazardwatch
    restart: unless-stopped

    ports:
      - "${HOST_PORT:-3000}:3000"

    environment:
      - NODE_ENV=production
      - INSTANCE_DATA_FOLDER=/app/data
      - INSTANCE_CONFIG_FILE=app-custom-config.json
      - EXTERNAL_PORT=${HOST_PORT:-3000}

    volumes:
      - ghw-data:/app/data

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => process.exit((r.statusCode === 200 || r.statusCode === 302) ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

volumes:
  ghw-data:
